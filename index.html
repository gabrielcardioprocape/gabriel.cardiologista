<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Gabriel Mendonça - Cardiologia Clínica e Hemodinâmica</title>
    <style>
        :root { 
            --marinho: #0a192f; 
            --marinho-escuro: #071222; /* Cor exata para fundir com a imagem do rodapé */
            --dourado: #c5a059; 
            --whats: #25D366; 
            --fundo: #f8fafc; 
            --texto: #334155;
            --branco: #ffffff;
        }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--fundo); display: flex; flex-direction: column; align-items: center; color: var(--texto); line-height: 1.6; }
        
        header { width: 100%; background: var(--marinho); padding: 35px 0; display: flex; flex-direction: column; align-items: center; border-bottom: 4px solid var(--dourado); text-align: center; }
        .logo-topo { width: 80%; max-width: 350px; height: auto; margin-bottom: 15px; }
        .titulo-dourado { color: var(--dourado); font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.5px; max-width: 85%; margin-bottom: 5px; }
        .registro-topo { color: rgba(255,255,255,0.7); font-size: 0.7rem; font-weight: 600; letter-spacing: 1px; }

        .faixa-rolagem { width: 100%; background: var(--marinho-escuro); color: var(--dourado); overflow: hidden; white-space: nowrap; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .faixa-content { display: inline-block; animation: scroll 45s linear infinite; }
        .faixa-content span { display: inline-block; padding: 0 25px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .container { width: 92%; max-width: 450px; padding-bottom: 40px; }

        .perfil-topo { background: white; padding: 25px; border-radius: 25px; margin-top: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .foto-perfil-wrapper { width: 125px; height: 125px; border-radius: 50%; border: 3px solid var(--dourado); margin: -65px auto 15px auto; overflow: hidden; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .foto-perfil-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .perfil-topo h2 { margin: 0; color: var(--marinho); font-size: 1.4rem; }
        .subtitulo-dourado { color: var(--dourado); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; display: block; margin-bottom: 15px; }

        .section-title { font-size: 0.8rem; font-weight: 800; color: var(--marinho); text-transform: uppercase; margin: 35px 0 15px 5px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #cbd5e1; }

        .btn { display: flex; align-items: center; justify-content: center; text-decoration: none; padding: 18px; border-radius: 18px; font-weight: 700; transition: 0.3s; gap: 12px; margin-bottom: 12px; font-size: 1rem; border: none; }
        .btn-whats { background: var(--whats); color: white; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
        .btn-insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; }

        .grid-servicos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-servico { background: white; padding: 15px; border-radius: 15px; font-size: 0.75rem; font-weight: 600; border: 1px solid #e2e8f0; text-align: center; color: var(--marinho); }
        .item-destaque { grid-column: span 2; border: 2px solid var(--dourado); background: #fffdf9; font-size: 0.9rem; padding: 20px; }
        .item-sub { grid-column: span 2; background: #f0f7ff; border-style: dashed; }

        footer { width: 100%; background: var(--marinho-escuro); color: #94a3b8; padding: 60px 0; text-align: center; }
        .footer-logo { width: 180px; height: auto; margin-bottom: 20px; }
        .footer-contatos { margin-bottom: 30px; font-size: 0.9rem; color: #cbd5e1; }
        .footer-contatos a { color: var(--dourado); text-decoration: none; font-weight: 600; }
        .footer-legal { font-size: 0.7rem; line-height: 1.8; color: #64748b; padding: 0 20px; max-width: 420px; margin: 0 auto; }
